version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: squant-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-squant}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: squant-redis
    ports:
      - "127.0.0.1:6379:6379"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    volumes:
      - redis-data:/data
    command: >
      sh -c 'if [ -z "$REDIS_PASSWORD" ]; then redis-server; else redis-server --requirepass "$REDIS_PASSWORD"; fi'
    healthcheck:
      test: >
        ["CMD", "sh", "-c", "if [ -z \"$REDIS_PASSWORD\" ]; then redis-cli -h 127.0.0.1 ping; else redis-cli -h 127.0.0.1 -a \"$REDIS_PASSWORD\" ping; fi"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: squant-backend
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-squant}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@127.0.0.1:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src/backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres-data:
  redis-data:
