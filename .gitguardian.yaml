# GitGuardian configuration
# Ignore test credentials and development configuration files

version: 2

secret:
  # Ignore test files and configuration with hardcoded test credentials
  ignored_paths:
    - 'scripts/test-env.sh'
    - 'docker-compose.local.yml'
    - 'docker-compose.test.yml'
    - 'docker-compose.dev.yml'
    - 'tests/**/*'
    - '.github/workflows/*.yml'
    - 'alembic.ini'
    - '.env.example'

  # Ignore generic password detector for test credentials
  ignored_detectors:
    - Generic Password
