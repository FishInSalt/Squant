services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: squant-postgres-dev
    environment:
      POSTGRES_USER: squant
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: squant
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5433:5432"  # Use 5433 to avoid conflict with other projects
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U squant -d squant"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: squant-redis-dev
    command: redis-server --appendonly yes
    volumes:
      - redis_dev_data:/data
    ports:
      - "6380:6379"  # Use 6380 to avoid conflict with other projects
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
  redis_dev_data:
