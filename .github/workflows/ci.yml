name: CI

on:
  push:
    branches: [ main, develop, cc/* ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"

    - name: Install dependencies
      run: |
        uv sync --all-extras

    - name: Run ruff linter
      run: |
        uv run ruff check src/ tests/

    - name: Run ruff formatter check
      run: |
        uv run ruff format --check src/ tests/
      continue-on-error: true

    - name: Run mypy type checker
      run: |
        uv run mypy src/squant --ignore-missing-imports
      continue-on-error: true

  api-contract-check:
    name: API Contract Check
    runs-on: ubuntu-latest
    needs: lint

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"

    - name: Install Python dependencies
      run: uv sync --all-extras

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 9

    - name: Install frontend dependencies
      run: cd frontend && pnpm install

    - name: Export OpenAPI schema
      run: uv run python scripts/export-openapi.py frontend/src/types/generated/openapi.json

    - name: Generate TypeScript types
      run: cd frontend && pnpm generate:types

    - name: Check for drift
      run: |
        if ! git diff --exit-code frontend/src/types/generated/; then
          echo "::error::API contract drift detected! Generated types differ from committed types."
          echo "Run './scripts/generate-api-types.sh' locally and commit the changes."
          git diff frontend/src/types/generated/
          exit 1
        fi
        echo "API contract types are up to date."

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 9

    - name: Install dependencies
      run: cd frontend && pnpm install

    - name: Run tests with coverage
      run: cd frontend && pnpm test:coverage

    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        files: ./frontend/coverage/lcov.info
        flags: frontend
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"

    - name: Install dependencies
      run: |
        uv sync --all-extras

    - name: Run unit tests
      env:
        DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
        REDIS_URL: redis://localhost:6379
        SECRET_KEY: test-secret-key-min-32-chars-long-for-testing-only
      run: |
        uv run pytest tests/unit -v --cov=src/squant --cov-report=xml

    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.xml
        flags: unittests
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint

    # Environment variables are loaded from .env.test.ci by conftest.py

    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: squant_test
          POSTGRES_PASSWORD: squant_test
          POSTGRES_DB: squant_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"

    - name: Install dependencies
      run: |
        uv sync --all-extras

    - name: Load test environment variables
      run: |
        # Export variables from .env.test.ci to GITHUB_ENV for subsequent steps
        grep -v '^#' .env.test.ci | grep -v '^$' | while read line; do
          echo "$line" >> $GITHUB_ENV
        done

    - name: Run database migrations
      run: |
        uv run alembic upgrade head

    - name: Run integration tests
      run: |
        uv run pytest tests/integration -v --cov=src/squant --cov-report=xml

    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.xml
        flags: integration
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]

    # Environment variables are loaded from .env.test.ci by conftest.py
    # Note: These env vars are for test scripts running on host, not for docker containers

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"

    - name: Install dependencies
      run: |
        uv sync --all-extras

    - name: Load test environment variables
      run: |
        # Export variables from .env.test.ci to GITHUB_ENV for subsequent steps
        grep -v '^#' .env.test.ci | grep -v '^$' | while read line; do
          echo "$line" >> $GITHUB_ENV
        done

    - name: Start E2E test environment
      run: |
        docker compose -f docker-compose.test.yml --profile e2e up -d
        sleep 30

    - name: Wait for API
      run: |
        max_attempts=30
        attempt=0
        until curl -f http://localhost:8000/api/v1/health || [ $attempt -eq $max_attempts ]; do
          echo "Waiting for API... (attempt $((attempt+1))/$max_attempts)"
          sleep 2
          attempt=$((attempt+1))
        done

    - name: Seed test data
      run: |
        uv run python tests/e2e/seed_data.py

    - name: Run E2E tests
      run: |
        uv run pytest tests/e2e -v --cov=src/squant --cov-report=xml

    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.xml
        flags: e2e
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    - name: Show logs on failure
      if: failure()
      run: |
        docker compose -f docker-compose.test.yml logs

    - name: Cleanup
      if: always()
      run: |
        docker compose -f docker-compose.test.yml --profile e2e down -v

  build-check:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: lint

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build Backend image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: false
        cache-from: type=gha
        cache-to: type=gha,mode=max

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, api-contract-check, frontend-tests, unit-tests, integration-tests, e2e-tests, build-check]
    if: always()

    steps:
    - name: Check results
      run: |
        echo "## CI Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- Lint: ${{ needs.lint.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- API Contract Check: ${{ needs.api-contract-check.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- Frontend Tests: ${{ needs.frontend-tests.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- Unit Tests: ${{ needs.unit-tests.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- Integration Tests: ${{ needs.integration-tests.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- E2E Tests: ${{ needs.e2e-tests.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- Build Check: ${{ needs.build-check.result }}" >> $GITHUB_STEP_SUMMARY

    - name: Fail if any job failed
      if: |
        needs.lint.result == 'failure' ||
        needs.api-contract-check.result == 'failure' ||
        needs.frontend-tests.result == 'failure' ||
        needs.unit-tests.result == 'failure' ||
        needs.integration-tests.result == 'failure' ||
        needs.e2e-tests.result == 'failure' ||
        needs.build-check.result == 'failure'
      run: |
        echo "One or more CI jobs failed"
        exit 1
