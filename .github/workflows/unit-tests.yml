name: Unit Tests

on:
  push:
    branches: [ main, develop, cc/* ]
  pull_request:
    branches: [ main, develop ]

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        version: "latest"

    - name: Install dependencies
      run: |
        uv sync --all-extras

    - name: Run unit tests
      env:
        DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
        REDIS_URL: redis://localhost:6379
        SECRET_KEY: test-secret-key-min-32-chars-long-for-testing-only
      run: |
        uv run pytest tests/unit -v --cov=src/squant --cov-report=xml --cov-report=term

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-unit
        fail_ci_if_error: false
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    - name: Generate coverage report
      if: always()
      env:
        DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
        REDIS_URL: redis://localhost:6379
        SECRET_KEY: test-secret-key-min-32-chars-long-for-testing-only
      run: |
        uv run pytest tests/unit --cov=src/squant --cov-report=html
        echo "## Unit Test Coverage" >> $GITHUB_STEP_SUMMARY
        uv run coverage report --format=markdown >> $GITHUB_STEP_SUMMARY
